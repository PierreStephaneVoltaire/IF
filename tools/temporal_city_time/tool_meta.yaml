tools:
  get_city_time:
    description: "Return the current local time, date, timezone identifier, and UTC offset for a given city. Supports ~50 major cities worldwide. If the city isn't recognized, returns a list of supported cities. Useful for scheduling across time zones, checking business hours, or coordinating with people in other locations."
    parameters:
      type: object
      properties:
        city:
          type: string
          description: "City name to get the current time for (e.g. 'Tokyo', 'new york', 'London')"
      required: ["city"]
