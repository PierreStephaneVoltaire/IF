tools:
  calculate_age:
    description: "Given a birth date, calculate the person's exact age in years, months, and days. Also returns the next birthday date, days until the next birthday, and zodiac sign. Optionally accepts a reference date (defaults to today) to calculate age at a specific point in time."
    parameters:
      type: object
      properties:
        birth_date:
          type: string
          description: "Birth date in YYYY-MM-DD format or a parseable date string"
        reference_date:
          type: string
          description: "Optional reference date (defaults to today) to calculate age at a specific point in time"
      required: ["birth_date"]
