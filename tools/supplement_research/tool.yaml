name: supplement_research
description: >
  Hybrid retrieval (BM25 + vector) over the supplement research PDF corpus
  (Examine.com and similar). PDFs are pulled from S3 on first use and
  indexed with LanceDB's native FTS + vector search, reranked with RRF.
  Contexts covered: strength, hypertrophy, sleep, recovery, cognition,
  longevity, general. Supports incremental re-index via SHA256 hashes
  and a full rebuild via rebuild=true.
  Available to: research_assistant, health_write. NOT main-agent.
version: 1.0.0
scope: specialist
execution: in_process
