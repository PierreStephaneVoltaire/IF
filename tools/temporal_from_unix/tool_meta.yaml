tools:
  unix_to_datetime:
    description: "Convert a Unix timestamp (seconds or milliseconds since epoch) into a structured datetime representation. Returns the ISO 8601 format, human-readable date and time, day of week, and relative description (e.g., \"3 days ago\", \"in 2 weeks\"). Auto-detects seconds vs milliseconds based on magnitude (timestamps > 10^12 treated as milliseconds)."
    parameters:
      type: object
      properties:
        unix_timestamp:
          type: number
          description: "Unix timestamp (seconds or milliseconds since epoch) to convert"
      required: ["unix_timestamp"]
