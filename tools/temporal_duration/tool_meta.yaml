tools:
  time_duration:
    description: "Compute the precise duration between two dates in multiple units. Returns the difference broken down into years, months, weeks, days, and hours. Useful for answering \"how long until...\", \"how many days between...\", or \"it's been X since...\". Accepts ISO 8601, YYYY-MM-DD, or natural language phrases (resolved via dateparser)."
    parameters:
      type: object
      properties:
        start_date:
          type: string
          description: "Start date (ISO 8601, YYYY-MM-DD, or natural language like 'january 1st', 'next monday')"
        end_date:
          type: string
          description: "End date (ISO 8601, YYYY-MM-DD, or natural language like 'december 31st', 'in 3 months')"
      required: ["start_date", "end_date"]
