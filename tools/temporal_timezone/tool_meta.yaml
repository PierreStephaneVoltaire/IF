tools:
  convert_timezone:
    description: "Convert any datetime string between two IANA timezones (e.g., \"America/New_York\", \"Europe/London\", \"Asia/Tokyo\"). Handles daylight saving time automatically via the IANA database. Accepts ISO 8601, YYYY-MM-DD HH:MM, or common formats. Returns both the converted datetime and the UTC offset for each timezone at that moment."
    parameters:
      type: object
      properties:
        datetime_str:
          type: string
          description: "The datetime string to convert (ISO 8601, YYYY-MM-DD HH:MM, or common formats)"
        from_tz:
          type: string
          description: "IANA timezone to convert from (e.g., \"America/New_York\", \"UTC\")"
        to_tz:
          type: string
          description: "IANA timezone to convert to (e.g., \"Europe/London\", \"Asia/Tokyo\")"
      required: ["datetime_str", "from_tz", "to_tz"]
