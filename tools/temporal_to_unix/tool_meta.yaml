tools:
  datetime_to_unix:
    description: "Parse any recognized datetime string (ISO 8601, RFC 2822, common formats, or natural language like \"march 15 2025 3pm\") and return the equivalent Unix timestamp (seconds since epoch). Also returns the parsed ISO 8601 representation and a human-readable rendering for verification."
    parameters:
      type: object
      properties:
        datetime_str:
          type: string
          description: "A datetime string to parse (ISO 8601, RFC 2822, common formats, or natural language like 'march 15 2025 3pm')"
      required: ["datetime_str"]
