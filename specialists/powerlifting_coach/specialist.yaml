description: >
  Use powerlifting_coach for any training-related question that requires
  reading program state and providing coaching advice: exercise selection,
  volume adjustments, periodization decisions, competition readiness
  assessment, peaking strategy, deload timing, attempt selection, RPE
  interpretation, weak point analysis, and any "should I..." training
  question. This is the default health specialist — use health_write
  only when the coach returns a HANDOFF_REQUIRED block requesting a
  program mutation.
preset: "@preset/health"
tools:
  - health_get_program
  - health_get_session
  - health_get_sessions_range
  - health_get_meta
  - health_get_phases
  - health_get_current_maxes
  - health_get_operator_prefs
  - health_get_breaks
  - health_comp_countdown
  - get_current_date
  - health_rag_search
mcp_servers: []
directive_types:
  - health
  - competition
