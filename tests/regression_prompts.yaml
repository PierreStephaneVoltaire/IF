# IF Agent Regression Test Prompts
# Categories: general, health, coding_simple, coding_agentic, file_ops, skills
#
# Used by regression_runner.py in both API mode and Discord mode.
# Each prompt is self-contained — no shared state between tests.

prompts:

  # ── GENERAL ────────────────────────────────────────────────────────────────

  - id: gen_001
    category: general
    name: "Basic self-description"
    prompt: "What are your capabilities? Give me a quick overview."

  - id: gen_002
    category: general
    name: "Summarizer dispatch"
    prompt: "Summarize this in 3 bullet points: LanceDB is an embedded vector database built on Apache Arrow and Lance columnar storage. It enables semantic search by storing dense embeddings alongside structured metadata. It supports zero-copy reads and is optimized for ML workloads requiring fast ANN queries."

  - id: gen_003
    category: general
    name: "Planner dispatch"
    prompt: "Create a step-by-step plan for migrating a SQLite database to PostgreSQL without downtime."

  - id: gen_004
    category: general
    name: "Email writer dispatch"
    prompt: "Draft a professional email requesting API documentation from a third-party vendor. The vendor is Acme Corp and the contact is sales@acme.com."

  - id: gen_005
    category: general
    name: "Todo generator dispatch"
    prompt: "Generate a prioritized TODO list for setting up a new Python FastAPI service with authentication, PostgreSQL, and Docker deployment."

  # ── HEALTH ─────────────────────────────────────────────────────────────────

  - id: health_001
    category: health
    name: "Read current program"
    prompt: "What's my current training program? Show me the structure and where I am in it."

  - id: health_002
    category: health
    name: "Competition countdown"
    prompt: "How many weeks until my next competition? What phase am I in right now?"

  - id: health_003
    category: health
    name: "Session log (mutation trigger)"
    prompt: "Log today's training session: squat 5x5 at 280lbs RPE 8, bench press 4x6 at 185lbs RPE 7, and deadlift 3x3 at 350lbs RPE 9."

  - id: health_004
    category: health
    name: "Deload advice"
    prompt: "I've been feeling fatigued this week and my bar speed is noticeably down. Should I take a deload? What does my program say?"

  - id: health_005
    category: health
    name: "RAG search — IPF rules"
    prompt: "What are the IPF rules for equipped powerlifting? Specifically around knee wraps vs knee sleeves."

  # ── CODING SIMPLE (non-agentic) ────────────────────────────────────────────

  - id: code_simple_001
    category: coding_simple
    name: "Code review — SQL injection"
    prompt: |
      Review this Python function for security, performance, and correctness:

      ```python
      def get_user(user_id):
          query = f"SELECT * FROM users WHERE id = {user_id}"
          return db.execute(query).fetchone()
      ```

  - id: code_simple_002
    category: coding_simple
    name: "Architecture — rate limiting"
    prompt: "Design a rate limiting system for a REST API that needs to handle 10,000 requests per second. Compare token bucket vs leaky bucket approaches and recommend one."

  - id: code_simple_003
    category: coding_simple
    name: "API designer dispatch"
    prompt: "Design a REST API for a task management system. Include resource modeling, endpoint naming, HTTP methods, and status codes. Output an OpenAPI-style summary."

  - id: code_simple_004
    category: coding_simple
    name: "Decision analysis — framework choice"
    prompt: "I need to choose between FastAPI, Flask, and Django for a new Python microservice. Use structured decision analysis with weighted criteria and give a recommendation."

  - id: code_simple_005
    category: coding_simple
    name: "Changelog writer dispatch"
    prompt: "Generate a changelog entry for a release that adds streaming support, fixes a memory leak in the connection pool, and deprecates the v1 auth endpoint."

  # ── CODING AGENTIC (SDK loop, multi-turn) ──────────────────────────────────

  - id: code_agentic_001
    category: coding_agentic
    name: "Scripter — write and run"
    prompt: "Write a Python one-liner that reads stdin line by line and prints only lines containing the word 'ERROR'. Run it with test input in the terminal."

  - id: code_agentic_002
    category: coding_agentic
    name: "Coder — generate and execute"
    prompt: "Write a Python script that generates the Fibonacci sequence up to n=20, run it in the terminal, and show the output."

  - id: code_agentic_003
    category: coding_agentic
    name: "Debugger — fix NameError"
    prompt: |
      This Python code throws a NameError at runtime. Debug it and fix it:

      ```python
      def greet(name):
          return greeting.format(name=name)

      print(greet('Alice'))
      ```

  - id: code_agentic_004
    category: coding_agentic
    name: "Test writer — unit tests"
    prompt: |
      Write comprehensive unit tests for this function including edge cases:

      ```python
      def safe_divide(a: float, b: float) -> float:
          if b == 0:
              raise ValueError('Division by zero')
          return a / b
      ```

  - id: code_agentic_005
    category: coding_agentic
    name: "Code explorer — debounce flow"
    prompt: "Explore this repository and explain how the message debouncing system works. Trace the full flow from when a Discord message arrives to when it reaches the agent."

  - id: code_agentic_006
    category: coding_agentic
    name: "File generator — dataclass"
    prompt: "Generate a Python dataclass file defining a TrainingSession model with fields: session_date (date), exercises (list of dicts), total_volume (float), rpe_average (float), notes (str). Include type hints and a from_dict class method."

  # ── FILE GENERATION & FILE READ/SEND ──────────────────────────────────────

  - id: file_001
    category: file_ops
    name: "Generate Python script file"
    prompt: "Create a Python script that implements a simple LRU cache with get and put methods. Save it as lru_cache.py and send it to me."

  - id: file_002
    category: file_ops
    name: "Generate bash script file"
    prompt: "Write a bash script that checks disk usage on all mounted filesystems and prints a warning if any mount point exceeds 80%. Save it as disk_check.sh and send it."

  - id: file_003
    category: file_ops
    name: "Generate markdown documentation file"
    prompt: "Create a markdown API reference document for a user management REST API with endpoints: GET /users, POST /users, GET /users/:id, DELETE /users/:id. Save it as api_docs.md and send it."

  - id: file_004
    category: file_ops
    name: "Generate requirements.txt"
    prompt: "Generate a requirements.txt for a FastAPI application with PostgreSQL (asyncpg), JWT authentication, Pydantic v2, and pytest. Save it as requirements.txt and send it."

  - id: file_005
    category: file_ops
    name: "Create file then read back"
    prompt: "Create a file called project_summary.md with a 5-item TODO list for improving a Python AI agent's reliability. Then read the file back and confirm its contents."

  - id: file_006
    category: file_ops
    name: "Read existing codebase file and summarize"
    prompt: "Read the main_system_prompt.txt file from the codebase. Summarize what you find and save the summary as a text file, then send it to me."

  # ── SKILLS ─────────────────────────────────────────────────────────────────

  - id: skills_001
    category: skills
    name: "Teach skill"
    prompt: "Explain how vector embeddings work in semantic search. Use the teach skill — explain the why, not just the what."

  - id: skills_002
    category: skills
    name: "Pro/con skill"
    prompt: "Analyze using pro_con: Should we store conversation history in SQLite or in-memory only for a single-user AI assistant?"

  - id: skills_003
    category: skills
    name: "Devil's advocate"
    prompt: "Our team has decided to use MongoDB for all data storage in our new microservices platform. Challenge this as a devil's advocate."

  - id: skills_004
    category: skills
    name: "Consensus builder"
    prompt: "What are the best practices for REST API versioning? Get perspectives from multiple specialists and synthesize a recommendation."
