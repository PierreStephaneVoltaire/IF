name: Build and Validate

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'specialists/**'
      - 'utils/**'
      - 'docker/**'
      - 'terraform/**'
      - '.github/workflows/build-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'specialists/**'
      - 'utils/**'
      - 'docker/**'
      - 'terraform/**'
      - '.github/workflows/build-deploy.yml'

env:
  AWS_REGION: ca-central-1
  ECR_PREFIX: if

jobs:
  # ===========================================
  # BUILD STAGE - Build all images with Packer
  # ===========================================
  build-main-api:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.10.0"

      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Login to ECR Private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Main API
        working-directory: ./docker
        run: |
          packer init build.pkr.hcl
          packer build -except=docker-push -var "image_repository=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}-agent-api" -var "image_tag=${{ github.sha }}" build.pkr.hcl

  build-portal-backends:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        portal:
          - name: main-portal
            port: "3000"
          - name: finance-portal
            port: "3002"
          - name: diary-portal
            port: "3003"
          - name: proposals-portal
            port: "3004"
          - name: powerlifting-app
            port: "3005"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.10.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Login to ECR Private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Portal Backend
        working-directory: ./docker
        env:
          PORTAL_NAME: ${{ matrix.portal.name }}
          PORTAL_PORT: ${{ matrix.portal.port }}
          ECR_REPO: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}-${{ matrix.portal.name }}-backend
        run: |
          packer init portals-backend.pkr.hcl
          packer build -except=docker-push -var "image_repository=$ECR_REPO" -var "image_tag=${{ github.sha }}" -var "portal_name=$PORTAL_NAME" -var "portal_port=$PORTAL_PORT" portals-backend.pkr.hcl

  build-portal-frontends:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        portal:
          - name: main-portal
          - name: finance-portal
          - name: diary-portal
          - name: proposals-portal
          - name: powerlifting-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.10.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./utils/${{ matrix.portal.name }}/frontend
        run: |
          npm ci
          npm run build

      - name: Login to ECR Public
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: Login to ECR Private
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Portal Frontend
        working-directory: ./docker
        env:
          PORTAL_NAME: ${{ matrix.portal.name }}
          ECR_REPO: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_PREFIX }}-${{ matrix.portal.name }}-frontend
        run: |
          packer init portals-frontend.pkr.hcl
          packer build -except=docker-push -var "image_repository=$ECR_REPO" -var "image_tag=${{ github.sha }}" -var "portal_name=$PORTAL_NAME" portals-frontend.pkr.hcl

  # ===========================================
  # TERRAFORM PLAN - Plan infrastructure changes
  # ===========================================
  terraform-plan:
    runs-on: ubuntu-latest
    needs: [build-main-api, build-portal-backends, build-portal-frontends]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install k3s
        run: |
          curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
          sudo chmod 644 /etc/rancher/k3s/k3s.yaml
          echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> $GITHUB_ENV
          mkdir -p ~/.kube
          sudo cp /etc/rancher/k3s/k3s.yaml ~/.kube/config
          sudo chown $USER:$USER ~/.kube/config
          kubectl wait --for=condition=ready node --all --timeout=120s

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.14.0"

      - name: Install Gateway API CRDs
        run: |
          kubectl apply --server-side -k github.com/kubernetes-sigs/gateway-api/config/crd?ref=v1.2.0

      - name: Install nginx-gateway-fabric
        run: |
          kubectl create namespace nginx-gateway
          helm repo add nginx https://helm.nginx.com/stable
          helm repo update
          helm install ngf nginx/nginx-gateway-fabric -n nginx-gateway --version 2.0.0 \
            --set nginx.service.type=LoadBalancer \
            --set nginxGateway.replicas=1
          kubectl rollout status deployment ngf-nginx-gateway-fabric -n nginx-gateway --timeout=120s

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend=true

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 7

  # ===========================================
  # VALIDATE - Quick checks on PRs
  # ===========================================
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "1.10.0"

      - name: Packer Format Check
        working-directory: ./docker
        run: packer fmt -check .
        continue-on-error: true

      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate
