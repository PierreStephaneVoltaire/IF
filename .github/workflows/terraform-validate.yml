name: Terraform Validate

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-validate.yml'

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -backend=false

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && (failure() || steps.fmt.outcome == 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format and Validate Results
            
            | Step | Result |
            |------|--------|
            | Format Check | ${{ steps.fmt.outcome }} |
            | Init | ${{ steps.init.outcome }} |
            | Validate | ${{ steps.validate.outcome }} |
            
            ${{ steps.fmt.outcome == 'failure' && '⚠️ **Terraform formatting issues detected. Run `terraform fmt -recursive` to fix.**' || '' }}
            ${{ steps.validate.outcome == 'failure' && '❌ **Terraform validation failed. Check the logs for details.**' || '' }}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if formatting issues
        if: steps.fmt.outcome == 'failure'
        run: |
          echo "::error::Terraform formatting issues detected. Run 'terraform fmt -recursive' to fix."
          exit 1
