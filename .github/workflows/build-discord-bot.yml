name: Build Discord Bot

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - '.github/workflows/build-discord-bot.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - '.github/workflows/build-discord-bot.yml'

jobs:
  build:
    name: Build and Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::Build output directory 'dist' not found"
            exit 1
          fi
          if [ ! -f "dist/index.js" ]; then
            echo "::error::Main entry point 'dist/index.js' not found"
            exit 1
          fi
          echo "✅ Build verified successfully"

      - name: Upload build artifacts
        if: matrix.node-version == '20.x' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: discord-bot-build
          path: app/dist/
          retention-days: 7

  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript strict mode
        run: npx tsc --noEmit --strict
        continue-on-error: true
