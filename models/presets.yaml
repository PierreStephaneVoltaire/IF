provider: openrouter

presets:
  code:
    models:
      - z-ai/glm-5.1
      - x-ai/grok-4.1-fast
      - deepseek/deepseek-v3.2
      - moonshotai/kimi-k2.5
      - google/gemini-3.1-pro-preview
      - anthropic/claude-sonnet-4.6
      - openai/gpt-5.4
      - minimax/minimax-m2.7
    sort_by: throughput_desc
    when: >
      Writing, reading, modifying, debugging, reviewing, or explaining any code or configuration
      artifact — application code, Terraform, Kubernetes manifests, Helm charts, Dockerfiles,
      CI/CD pipelines, Prometheus rules, Grafana dashboards, shell scripts, SQL queries, tests,
      API implementations, data pipelines, automation scripts, or any task whose output is a
      concrete file being created or changed. Also: explaining what specific code does, tracing
      a bug to its root cause, writing or fixing tests, refactoring, reviewing a PR, generating
      OpenAPI specs, UI and frontend generation tasks.
      NOT for: high-level design without code output → architecture.
      NOT for: one-liner commands or short CLI snippets → shell.

  architecture:
    models:
      - z-ai/glm-5.1
      - google/gemini-3.1-pro-preview
      - openai/gpt-5.4
      - anthropic/claude-sonnet-4.6
      - anthropic/claude-opus-4.6
    sort_by: price_asc
    when: >
      System design, architecture planning, and technical strategy where the output is a plan,
      diagram, trade-off analysis, RFC, ADR, or evaluation — not code. Includes: backend design,
      API design at the conceptual level, infrastructure design, platform engineering strategy,
      SLO/SLI/SLA planning, FinOps strategy, capacity planning, scaling strategies, migration
      planning, technology selection and comparison, resilience patterns, AI/ML infrastructure
      planning, roadmap planning, architecture critique. Also: decisions between frameworks,
      tools, or approaches at a senior-technical discussion level.
      NOT for: tasks producing actual code or config files → code.
      NOT for: security posture, threat modeling, or compliance → security.

  shell:
    models:
      - x-ai/grok-4.1-fast
      - openai/gpt-5.4-nano
      - openai/gpt-5-nano
      - google/gemini-3.1-flash-lite-preview
      - google/gemma-4-26b-a4b-it
      - anthropic/claude-haiku-4.5
      - openai/gpt-oss-120b
      - qwen/qwen3-next-80b-a3b-instruct
      - nvidia/nemotron-3-super-120b-a12b
    sort_by: price_asc
    when: >
      One-liner commands, piped commands, short CLI snippets, and terminal troubleshooting.
      Covers any CLI tool: kubectl, helm, terraform, docker, git, argocd, aws/az/gcloud,
      curl, openssl, ssh, jq, yq, awk, sed, grep, iptables, systemctl, ps, netstat, dig,
      and similar. Typical queries: flag lookups, quick command composition, environment
      variable issues, file permissions, process management.
      NOT for: full scripts with logic, loops, or error handling → code.

  security:
    models:
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
      - openai/gpt-5.4
      - anthropic/claude-opus-4.6
    sort_by: price_asc
    when: >
      Security analysis, threat modeling, vulnerability assessment, penetration testing methodology,
      security architecture review, compliance frameworks (SOC2, ISO 27001, PCI-DSS, HIPAA),
      IAM and least-privilege design, network security, zero-trust architecture, secrets management,
      encryption strategies, CVE analysis, incident response planning, security hardening,
      OWASP guidance, WAF and DDoS mitigation, supply chain security, container security,
      cloud security posture, and security tool evaluation. Attack surface, risk, and defensive
      posture — analysis and strategy, not implementation.
      NOT for: writing OPA policies, network policies, or security scanning config → code.
      NOT for: running security tools from the terminal → shell.

  health:
    models:
      - google/gemini-3.1-pro-preview
      - anthropic/claude-sonnet-4.6
      - openai/gpt-5.4
      - anthropic/claude-opus-4.6
    sort_by: price_asc
    when: >
      Physical health, fitness, nutrition, and sports performance. Includes: diets, meal planning,
      macros, supplements, powerlifting, bodybuilding, workout programming, deload strategies,
      recovery, sleep, mobility, injury management, peaking cycles, water cutting, weight
      management, body composition, bloodwork interpretation, symptoms, medications, and medical
      conditions. Also covers logging training sessions, updating RPE, bodyweight entries, and
      mutations to training programs.
      NOT for: emotional distress, burnout, grief, or psychological struggles → mental_health.
      NOT for: healthcare costs, insurance, or medical billing → general or finance.

  mental_health:
    models:
      - moonshotai/kimi-k2.5
      - anthropic/claude-sonnet-4.6
      - google/gemini-3-flash-preview
      - anthropic/claude-opus-4.6
    sort_by: throughput_desc
    when: >
      Emotional processing, venting, and mental health support. Includes: hopelessness, despair,
      frustration with life, existential dread, burnout, grief, loneliness, anxiety, depression,
      self-worth struggles, feeling overwhelmed, relationship distress, identity crises — whether
      stated explicitly or implied between the lines. Also: coping strategies, grounding techniques,
      stress management, and guidance toward professional resources. The operator may vent without
      seeking a solution; presence and acknowledgment are the priority, not problem-solving.
      NOT for: clinical questions about medication dosage or diagnosis criteria → health.

  finance:
    models:
      - deepseek/deepseek-v3.2
      - moonshotai/kimi-k2.5
      - google/gemini-3.1-pro-preview
      - openai/gpt-5.4
      - anthropic/claude-opus-4.6
    sort_by: throughput_desc
    when: >
      Financial instruments, market data, and structured financial analysis. Includes: stocks,
      ETFs, crypto, bonds, options, trading, technical analysis, portfolio strategy, risk
      management, taxes, retirement planning, FIRE, budgeting, debt management, investing
      strategies, financial independence, financial modeling, forecasting, and market commentary.
      Also covers finance snapshot mutations: updating balances, holdings, or financial goals.
      NOT for: interpersonal situations where money is context but the real question is about
      judgment or behavior (e.g. lending to a friend, a coworker's raise) → general.

  proofreader:
    models:
      - google/gemini-3.1-flash-lite-preview
      - anthropic/claude-haiku-4.5
      - openai/gpt-5.4-mini
      - mistralai/mistral-small-3.2-24b-instruct
      - google/gemma-4-31b-it
      - minimax/minimax-m2.7
    sort_by: latency_asc
    when: >
      Editing, rewriting, or drafting non-code prose. Includes: emails, Slack messages, cover
      letters, professional correspondence, essays, blog posts, social media posts, bios,
      announcements, apologies, complaints, Jira tickets, meeting notes, and any text where
      the goal is grammar correction, tone adjustment, clarity improvement, length reduction,
      or a full rewrite. Also: drafting something from scratch with specific tone requirements.
      NOT for: code comments, docstrings, or README content inside a code project → code.

  social:
    models:
      - google/gemini-3.1-flash-lite-preview
      - openai/gpt-5.4-nano
      - z-ai/glm-4.7-flash
      - openai/gpt-5-nano
      - google/gemma-4-26b-a4b-it
      - x-ai/grok-4.1-fast
      - openai/gpt-oss-120b
    sort_by: latency_asc
    when: >
      Pure social exchanges with no substantive information request and no emotional distress.
      Includes: greetings, farewells, thanks, acknowledgments, compliments, banter, jokes,
      reactions, internet slang, casual chat, "got it", "lol", "sounds good", small talk.
      If any actual question or task is embedded in the casual framing, use the category
      matching that task instead.
      NOT for: emotional pain or distress, even expressed casually → mental_health.

  general:
    models:
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
      - openai/gpt-5.4-nano
      - deepseek/deepseek-v3.2
      - openai/gpt-5.4-mini
      - moonshotai/kimi-k2.5
      - qwen/qwen3.6-plus
    sort_by: latency_asc
    when: >
      Everything that does not fit a more specific category. General knowledge, personal decisions,
      moral guidance, career advice, creative writing, brainstorming, philosophical questions,
      relationship advice, interpersonal conflicts, workplace dynamics, life decisions, opinions
      on what to learn or study. Also catches situations where money, numbers, or technical terms
      appear as context but the real question is about judgment, values, or behavior — e.g.
      should I lend money to a friend, my manager acts differently since the reorg, someone
      spent their savings irresponsibly. Always non-technical. True catch-all.

  research:
    models:
      - perplexity/sonar-pro-search
      - perplexity/sonar-reasoning
      - anthropic/claude-sonnet-4.6:online
      - openai/gpt-5.4:online
      - anthropic/claude-opus-4.6:online
    sort_by: price_asc
    when: >
      Up-to-date information gathering and synthesis where training-data staleness is a risk.
      Covers: medical/scientific research, current documentation, API specs, vendor pricing,
      news, market data, legal/regulatory updates, competitive intel, "latest" or "recent"
      queries on any topic. Uses native web search — Perplexity Sonar or OpenRouter :online
      suffix — no separate search MCP needed. Also the right preset for the research_assistant
      specialist, which couples native search with the local supplement_research PDF corpus.
      NOT for: static codebase reasoning → code.
      NOT for: local supplement PDF corpus only → call supplement_search directly from the
      research_assistant.
      NOT for: computed financial data → finance.

  pondering:
    models:
      - qwen/qwen3-max-thinking
      - deepseek/deepseek-v3.2-speciale
      - z-ai/glm-5-turbo
      - openai/gpt-5.4-nano
      - moonshotai/kimi-k2.5
      - google/gemma-4-31b-it
      - anthropic/claude-sonnet-4.6
    sort_by: price_asc
    when: >
      Agent-initiated reflective conversation. Used by the heartbeat system after idle periods
      to proactively engage the operator. Focus is on learning about the operator — their goals,
      preferences, current context, plans, frustrations, or growth. Deep thinking, not
      problem-solving. Not triggered by operator messages; triggered by the agent itself.