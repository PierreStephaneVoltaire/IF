# Internal tier configuration for the main agent.
# Selected by context size, NOT by task classification.
# Each tier maps to a pool of concrete model IDs from the model registry.

tiers:
  air:
    models:
      - openai/gpt-5.4-nano
      - openai/gpt-oss-120b
      - google/gemma-4-26b-a4b-it
      - deepseek/deepseek-v3.2
      - google/gemma-4-31b-it
      - z-ai/glm-5
    sort_by: throughput_desc
    context_limit: 150000

  standard:
    models:
      - google/gemini-3.1-flash-lite-preview
      - anthropic/claude-haiku-4.5
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
      - openai/gpt-5.4-mini
      - z-ai/glm-5-turbo
      - qwen/qwen3.5-35b-a3b
      - minimax/minimax-m2.7
      - moonshotai/kimi-k2.5
    sort_by: latency_asc
    context_limit: 200000

  heavy:
    models:
      - anthropic/claude-opus-4.6
      - openai/gpt-5.4
      - google/gemini-3.1-pro-preview
    sort_by: price_asc
    context_limit: 1000000

# Media tiers — used when the conversation contains images/files.
# Models must support vision (image input modality).
media_tiers:
  air:
    models:
      - anthropic/claude-haiku-4.5
      - google/gemini-3-flash-preview
    sort_by: price_asc

  standard:
    models:
      - anthropic/claude-sonnet-4.6
      - google/gemini-3.1-pro-preview
    sort_by: price_asc

  heavy:
    models:
      - anthropic/claude-opus-4.6
      - google/gemini-4-31b-it
    sort_by: context_size_desc
